<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D-моделирование с Three.js</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 12px 25px;
            border-radius: 30px;
            font-size: 1rem;
            z-index: 10;
            text-align: center;
            pointer-events: none;
            backdrop-filter: blur(4px);
        }
        #info span {
            color: #ffcc00;
            font-weight: bold;
        }
        @media (max-width: 600px) {
            #info {
                font-size: 0.8rem;
                padding: 8px 16px;
                top: 10px;
            }
        }
    </style>
</head>
<body>
    <div id="info">🟦 <span>Three.js</span> — вращающийся куб</div>

    <!-- Подключение Three.js с CDN [citation:6][citation:10] -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // 1. Создаем сцену [citation:6]
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        // 2. Создаем камеру [citation:6]
        const camera = new THREE.PerspectiveCamera(
            75,                           // угол обзора
            window.innerWidth / window.innerHeight, // соотношение сторон
            0.1,                          // ближняя плоскость отсечения
            1000                          // дальняя плоскость отсечения
        );
        camera.position.z = 5;

        // 3. Создаем рендерер [citation:6][citation:10]
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // 4. Создаем куб [citation:6][citation:10]
        const geometry = new THREE.BoxGeometry(1.5, 1.5, 1.5);
        
        // Материал с цветом и отражением
        const material = new THREE.MeshStandardMaterial({
            color: 0x00aaff,
            roughness: 0.3,
            metalness: 0.7,
            emissive: new THREE.Color(0x0044aa),
            emissiveIntensity: 0.1
        });
        
        const cube = new THREE.Mesh(geometry, material);
        scene.add(cube);

        // 5. Добавляем освещение [citation:6]
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(5, 10, 7);
        scene.add(directionalLight);

        const backLight = new THREE.PointLight(0x4488ff, 0.5);
        backLight.position.set(-3, 0, -3);
        scene.add(backLight);

        // 6. Добавляем пол (для красоты)
        const gridHelper = new THREE.GridHelper(10, 20, 0x8888ff, 0x444466);
        gridHelper.position.y = -1.2;
        scene.add(gridHelper);

        // 7. Анимация [citation:6][citation:10]
        function animate() {
            requestAnimationFrame(animate);

            // Вращаем куб
            cube.rotation.x += 0.008;
            cube.rotation.y += 0.015;

            // Легкое покачивание вверх-вниз
            cube.position.y = Math.sin(Date.now() * 0.001) * 0.2;

            renderer.render(scene, camera);
        }

        animate();

        // 8. Адаптация под изменение размера окна
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        console.log('✅ Three.js сцена загружена!');
    </script>
</body>
</html>
